<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISO Interconnection Queue — Tabla Unificada</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:12px;background:#f1f5f9;color:#0f172a;padding:16px}
h1{font-size:16px;font-weight:700;margin-bottom:3px}
.sub{font-size:11px;color:#64748b;margin-bottom:14px}
.drop{border:2px dashed #cbd5e1;border-radius:10px;padding:26px 20px;text-align:center;cursor:pointer;background:#fff;transition:all .15s;margin-bottom:10px}
.drop:hover,.drop.over{background:#eff6ff;border-color:#6366f1}
.drop strong{font-size:13px}
.drop span{font-size:11px;color:#94a3b8;display:block;margin-top:4px}
.log{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:11px;color:#475569;display:none}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.stat{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:7px 14px;text-align:center;min-width:80px;cursor:pointer}
.stat .n{font-size:18px;font-weight:700}
.stat .l{font-size:10px;color:#64748b;margin-top:1px}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px;display:none}
input[type=text]{padding:5px 10px;border-radius:6px;border:1px solid #cbd5e1;font-size:11px;width:220px;outline:none}
select{padding:5px 8px;border-radius:6px;border:1px solid #cbd5e1;font-size:11px;background:#fff;color:#0f172a;outline:none}
.btn-clear{padding:5px 10px;border-radius:6px;border:1px solid #fca5a5;background:#fef2f2;color:#dc2626;cursor:pointer;font-size:11px}
.rcount{font-size:10px;color:#94a3b8;margin-left:auto}
.wrap{overflow-x:auto;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);display:none}
table{border-collapse:collapse;width:100%;background:#fff}
thead tr{background:#0f172a}
th{padding:8px 10px;text-align:left;font-size:10px;font-weight:600;color:#94a3b8;white-space:nowrap;cursor:pointer;user-select:none}
th:hover,th.sorted{color:#c7d2fe}
td{padding:6px 10px;font-size:11px;border-bottom:1px solid #f1f5f9;white-space:nowrap;max-width:180px;overflow:hidden;text-overflow:ellipsis}
tr:nth-child(even) td{background:#f8fafc}
tr:hover td{background:#eff6ff!important}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.fuel-badge{background:#f0fdf4;color:#15803d;padding:2px 7px;border-radius:4px;font-size:10px}
.mw{text-align:right;font-weight:600}
.empty{text-align:center;padding:40px;color:#94a3b8;font-size:13px}
.pag{display:flex;justify-content:center;gap:5px;margin-top:12px;flex-wrap:wrap;align-items:center}
.pag button{padding:4px 10px;border-radius:6px;border:1px solid #cbd5e1;background:#fff;cursor:pointer;font-size:11px;color:#475569}
.pag button.active{background:#6366f1;border-color:#6366f1;color:#fff;font-weight:700}
.pag button:disabled{opacity:.4;cursor:default}
.pag .info{font-size:10px;color:#94a3b8}
</style>
</head>
<body>

<h1>ISO Interconnection Queue — Tabla Unificada</h1>
<p class="sub">Arrastra los CSVs de cada ISO · Los datos se normalizan automáticamente a las 15 categorías estándar</p>

<div class="drop" id="dz" onclick="document.getElementById('fi').click()"
  ondragover="event.preventDefault();this.classList.add('over')"
  ondragleave="this.classList.remove('over')"
  ondrop="this.classList.remove('over');handleFiles(event.dataTransfer.files);event.preventDefault()">
  <input type="file" id="fi" multiple accept=".csv" style="display:none" onchange="handleFiles(this.files)">
  <strong>Arrastra los CSVs aquí</strong> o haz clic para seleccionar
  <span>MISO · PJM · CAISO · ERCOT · SPP · NYISO · ISO-NE — podés cargar varios a la vez</span>
</div>

<div class="log" id="log"></div>
<div class="stats" id="stats"></div>
<div class="filters" id="fbar">
  <input type="text" id="srch" placeholder="🔍 Buscar proyecto, estado, fuel..." oninput="applyFilters()">
  <select id="fiso" onchange="applyFilters()"><option value="">Todos los ISOs</option></select>
  <select id="ffuel" onchange="applyFilters()"><option value="">Todos los fuels</option></select>
  <select id="fstate" onchange="applyFilters()"><option value="">Todos los estados</option></select>
  <select id="fstatus" onchange="applyFilters()"><option value="">Todo status</option></select>
  <button class="btn-clear" onclick="clearFilters()">✕ Limpiar</button>
  <span class="rcount" id="rcount"></span>
</div>
<div class="wrap" id="wrap">
  <table>
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>
<div class="pag" id="pag"></div>
